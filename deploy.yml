name: Build & Deploy BrokerPulse

# Auto-runs whenever you push new report files (or any change)
on:
  push:
    branches: [main]
  workflow_dispatch:    # also allows manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy xlrd openpyxl lxml html5lib

      - name: Generate dashboard from data/reports/
        run: python generate_dashboard.py

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # serves index.html from repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
